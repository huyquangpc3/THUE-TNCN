<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Animated background -->
  <div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900"></div>
  <div class="absolute top-1/4 -left-32 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl animate-pulse-slow"></div>
  <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl animate-pulse-slow"></div>

  <div class="relative w-full max-w-md animate-slide-up">
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/40 mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Thuế TNCN</h1>
      <p class="text-slate-400 text-sm mt-1">Hệ thống tính thuế thu nhập cá nhân</p>
    </div>

    <!-- Card -->
    <div class="card p-8">
      <!-- Tab Switcher (Login / Register) -->
      <div *ngIf="mode !== 'forgot'" class="flex bg-slate-700/50 rounded-xl p-1 mb-6">
        <button (click)="setMode('login')"
          [class]="mode === 'login' ? 'flex-1 py-2 text-sm font-semibold text-white bg-blue-600 rounded-lg shadow transition-all duration-200' : 'flex-1 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors duration-200'">
          Đăng Nhập
        </button>
        <button (click)="setMode('register')"
          [class]="mode === 'register' ? 'flex-1 py-2 text-sm font-semibold text-white bg-blue-600 rounded-lg shadow transition-all duration-200' : 'flex-1 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors duration-200'">
          Đăng Ký
        </button>
      </div>

      <!-- Forgot Password Header -->
      <div *ngIf="mode === 'forgot'" class="mb-6">
        <button (click)="setMode('login')" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm mb-4">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          Quay lại đăng nhập
        </button>
        <h2 class="text-lg font-bold text-white">Quên mật khẩu?</h2>
        <p class="text-slate-400 text-sm mt-1">Nhập email để nhận link đặt lại mật khẩu.</p>
      </div>

      <!-- Success/Error messages -->
      <div *ngIf="successMessage" class="flex items-start gap-3 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-xl mb-4">
        <svg class="w-5 h-5 text-emerald-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-emerald-400 text-sm">{{ successMessage }}</p>
      </div>
      <div *ngIf="error" class="flex items-start gap-3 p-4 bg-red-500/10 border border-red-500/30 rounded-xl mb-4">
        <svg class="w-5 h-5 text-red-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-red-400 text-sm">{{ error }}</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" class="space-y-4">
        <div class="form-group">
          <label class="label" for="email">Địa chỉ Email</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </span>
            <input id="email" type="email" [(ngModel)]="email" name="email"
              class="input-field pl-10" placeholder="email&#64;example.com" autocomplete="email" required>
          </div>
        </div>

        <div *ngIf="mode !== 'forgot'" class="form-group">
          <label class="label" for="password">Mật khẩu</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input id="password" [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password" name="password"
              class="input-field pl-10 pr-12" placeholder="Tối thiểu 6 ký tự" autocomplete="current-password" required>
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition-colors">
              <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <div *ngIf="mode === 'register'" class="form-group">
          <label class="label" for="confirmPassword">Xác nhận mật khẩu</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
            </span>
            <input id="confirmPassword" [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="confirmPassword" name="confirmPassword"
              class="input-field pl-10" placeholder="Nhập lại mật khẩu" required>
          </div>
        </div>

        <div *ngIf="mode === 'login'" class="flex justify-end">
          <button type="button" (click)="setMode('forgot')"
            class="text-sm text-blue-400 hover:text-blue-300 transition-colors">
            Quên mật khẩu?
          </button>
        </div>

        <button type="submit" [disabled]="loading" class="btn-primary w-full mt-2">
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span *ngIf="!loading">
            {{ mode === 'login' ? 'Đăng Nhập' : mode === 'register' ? 'Tạo Tài Khoản' : 'Gửi Email Đặt Lại' }}
          </span>
          <span *ngIf="loading">Đang xử lý...</span>
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      © {{ year }} Hệ thống Thuế TNCN · Phát triển nội bộ
    </p>
  </div>
</div>
